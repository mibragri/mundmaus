[platformio]
default_envs = esp32

[env]
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
lib_ldf_mode = deep+
lib_deps =
    me-no-dev/ESPAsyncWebServer @ ^3.6.0
    me-no-dev/AsyncTCP @ ^3.3.2
    bblanchon/ArduinoJson @ ^7.0.0
build_flags =
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=0
    -DCONFIG_ASYNC_TCP_USE_WDT=0
    -DMUNDMAUS_VERSION=\"4.2.1\"
    -DMUNDMAUS_FW_VERSION=421
    ; OTA_AUTH_B64 injected by pre-script from ota_auth.py (or env var)
    -std=gnu++17
    -Wall
    -Wextra
    -Werror
    -Wno-unused-parameter      ; Arduino callbacks often have unused params
    -Wno-missing-field-initializers  ; ArduinoJson triggers this
build_unflags = -std=gnu++11
extra_scripts = pre:fix_arduino3_deps.py
check_tool = cppcheck, clangtidy
check_flags =
    cppcheck: --enable=all --suppress=missingIncludeSystem --suppress=unusedFunction --suppress=unmatchedSuppression --inline-suppr
    clangtidy: --checks=-*,bugprone-*,performance-*,readability-*,modernize-*,clang-analyzer-*,cert-*,concurrency-*,misc-*,-bugprone-easily-swappable-parameters,-bugprone-narrowing-conversions,-bugprone-branch-clone,-readability-magic-numbers,-cert-err58-cpp,-misc-non-private-member-variables-in-classes,-misc-include-cleaner,-readability-identifier-length,-readability-function-cognitive-complexity --fix-errors=false
check_severity = low

[env:esp32]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32dev
board_build.partitions = partitions_ota.csv
build_flags =
    ${env.build_flags}
    -DBOARD_ESP32_WROOM
    -DPIN_VRX=33
    -DPIN_VRY=35
    -DPIN_SW=21
    -DPIN_PUFF_DATA=32
    -DPIN_PUFF_CLK=25

[env:esp32s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-s3-devkitc-1
board_build.partitions = default_8MB.csv
build_flags =
    ${env.build_flags}
    -DBOARD_ESP32_S3
    -DPIN_VRX=1
    -DPIN_VRY=2
    -DPIN_SW=42
    -DPIN_PUFF_DATA=4
    -DPIN_PUFF_CLK=5
