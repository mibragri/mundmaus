[tool.ruff]
# MicroPython: kein pathlib, keine type hints, print ist Standard-Output
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = [
    "F",      # Pyflakes (unused imports, undefined names)
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "I",      # isort (import sorting)
    "N",      # pep8-naming
    "RUF",    # Ruff-specific rules
]
ignore = [
    "F821",   # undefined-name — MicroPython modules (machine, network, utime etc.)
    "E701",   # multiple-statements-on-one-line — common in MicroPython for compact code
    "E702",   # multiple-statements-on-one-line-semicolon
    "E722",   # bare-except — MicroPython often needs broad exception handling
]

# Rules NOT enabled (intentional for MicroPython):
# ANN  — no type annotations in MicroPython
# PTH  — no pathlib in MicroPython
# UP   — no modern Python upgrades (stuck on ~3.11 subset)
# S    — security rules not applicable to embedded firmware
# BLE  — blind-except is common pattern in MicroPython
# G    — no logging module in MicroPython, print is standard
# T20  — print is the ONLY output method in MicroPython
# FA   — no __future__ annotations
# TRY  — try/except patterns differ in MicroPython

[tool.ruff.lint.per-file-ignores]
# Boot/main have imports that depend on hardware
"boot.py" = ["E402", "F401", "I001"]  # imports interleaved with calls (MicroPython boot pattern)
"main.py" = ["E402"]
"server.py" = ["E501"]  # embedded HTML/JS portal template has long lines
